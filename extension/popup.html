<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 320px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111110;
      color: #F1EFE8;
    }
    h3 { 
      font-size: 14px; 
      font-weight: 500; 
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: #26215C;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #AFA9EC;
      font-weight: bold;
    }
    .input-group { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5F5E5A;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #1A1A18;
      border: 1px solid #2C2C2A;
      border-radius: 6px;
      color: #F1EFE8;
      font-size: 12px;
      font-family: monospace;
    }
    input:focus {
      outline: none;
      border-color: #534AB7;
    }
    input::placeholder { color: #5F5E5A; }
    .btn {
      width: 100%;
      padding: 10px;
      background: #534AB7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #2C2C2A;
      margin-top: 8px;
    }
    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      display: none;
    }
    .status.show { display: block; }
    .status.synced { background: #04342C; color: #1D9E75; border: 1px solid #1D9E7530; }
    .status.error { background: #501313; color: #E24B4A; border: 1px solid #791F1F; }
    .status.info { background: #1A1A18; color: #888780; border: 1px solid #2C2C2A; }
    .stats {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2C2C2A;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      text-align: center;
      padding: 8px;
      background: #1A1A18;
      border-radius: 6px;
      border: 1px solid #2C2C2A;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 500;
      font-family: monospace;
      color: #F1EFE8;
    }
    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5F5E5A;
      margin-top: 2px;
    }
    .help {
      margin-top: 12px;
      font-size: 10px;
      color: #5F5E5A;
      line-height: 1.5;
    }
    .help p { margin-bottom: 4px; }
    .sync-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .sync-indicator.online { background: #1D9E75; }
    .sync-indicator.offline { background: #E24B4A; }
    .sync-indicator.syncing { 
      background: #EF9F27; 
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <h3>
    <div class="logo">PG</div>
    PropGuard Auto-Sync
  </h3>
  
  <div class="input-group">
    <label>PropGuard Account ID</label>
    <input type="text" id="accountId" placeholder="e.g. 35803ab8-...">
  </div>
  
  <div class="input-group">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Your PropGuard API key">
  </div>
  
  <button id="connectBtn" class="btn">
    <span class="sync-indicator offline" id="indicator"></span>
    Connect & Sync Now
  </button>
  
  <button id="autoSyncBtn" class="btn btn-secondary">Enable Auto-Sync (5min)</button>
  
  <div id="status" class="status"></div>
  
  <div class="stats" id="stats" style="display:none">
    <div class="stat">
      <div class="stat-value" id="tradeCount">0</div>
      <div class="stat-label">Trades</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="lastSync">—</div>
      <div class="stat-label">Last Sync</div>
    </div>
  </div>
  
  <div class="help">
    <p>1. Open MT5 Web Terminal & login</p>
    <p>2. Enter your PropGuard Account ID</p>
    <p>3. Click "Connect & Sync Now"</p>
    <p>4. Trades appear in Journal automatically</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
